name: CI

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'm3u8-queue-downloader/**'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'm3u8-queue-downloader/**'
      - '.github/workflows/ci.yml'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gui:
    name: GUI checks
    runs-on: windows-latest
    defaults:
      run:
        working-directory: m3u8-queue-downloader

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: m3u8-queue-downloader/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: m3u8-queue-downloader/src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend unit tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml -- --nocapture

      - name: Check Rust crate
        run: cargo check --manifest-path src-tauri/Cargo.toml --locked
