name: Package GUI

on:
  workflow_dispatch:
    inputs:
      run_tests:
        description: 'Run frontend and Rust tests before packaging'
        required: true
        type: boolean
        default: true

concurrency:
  group: package-gui-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows package artifact
    runs-on: windows-latest
    defaults:
      run:
        working-directory: m3u8-queue-downloader

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: npm
          cache-dependency-path: m3u8-queue-downloader/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: m3u8-queue-downloader/src-tauri -> target

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend unit tests
        if: ${{ inputs.run_tests }}
        run: npm test

      - name: Run Rust tests
        if: ${{ inputs.run_tests }}
        run: cargo test --manifest-path src-tauri/Cargo.toml -- --nocapture

      - name: Install ffmpeg
        shell: pwsh
        working-directory: .
        run: choco install ffmpeg --yes --no-progress

      - name: Stage bundled runtime resources
        shell: pwsh
        working-directory: .
        run: |
          nuget restore N_m3u8DL-CLI.sln
          msbuild N_m3u8DL-CLI.sln /p:Configuration=Release /p:DebugSymbols=false /p:DebugType=None
          $ffmpeg = (Get-Command ffmpeg).Source
          Push-Location m3u8-queue-downloader
          npm run resources:stage -- --cli ../N_m3u8DL-CLI/bin/Release/N_m3u8DL-CLI.exe --ffmpeg $ffmpeg
          npm run resources:validate
          Pop-Location

      - name: Build Tauri installer
        run: npm run tauri:build -- --ci --no-sign

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: m3u8-queue-downloader-windows-${{ github.sha }}
          path: |
            m3u8-queue-downloader/src-tauri/target/release/bundle/nsis/*.exe
            m3u8-queue-downloader/src-tauri/target/release/bundle/nsis/*.zip
          if-no-files-found: error