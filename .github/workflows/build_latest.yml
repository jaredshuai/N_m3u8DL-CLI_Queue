name: Build_Latest

on:
  push:
    branches:
      - master
      - main
    paths:
      - 'N_m3u8DL-CLI/**'
      - 'N_m3u8DL-CLI.sln'
      - '.github/workflows/build_latest.yml'
  pull_request:
    paths:
      - 'N_m3u8DL-CLI/**'
      - 'N_m3u8DL-CLI.sln'
      - '.github/workflows/build_latest.yml'
  workflow_dispatch:

concurrency:
  group: build-latest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  legacy-cli:
    name: Legacy CLI build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore N_m3u8DL-CLI.sln

      - name: Build legacy CLI
        run: msbuild N_m3u8DL-CLI.sln /p:Configuration=Release /p:DebugSymbols=false /p:DebugType=None

      - name: Upload legacy CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: N_m3u8DL-CLI_latest
          path: N_m3u8DL-CLI/bin/Release/N_m3u8DL-CLI.exe
          if-no-files-found: error
